name: CI/CD — Frontend Tests, Build & Deploy

on:
  push:
    branches: [deploy]
  pull_request:
    branches: [main, deploy]

jobs:
  test-and-deploy:
    name: Tests, Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios
        run: npm run test

      - name: Verificar build de producción
        run: npm run build
        env:
          VITE_API_GATEWAY_URL: http://localhost:9090

      - name: Deploy a Vercel
        if: github.ref == 'refs/heads/deploy' && github.event_name == 'push'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
