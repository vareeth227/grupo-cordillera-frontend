name: CD — Build y publicar imagen Docker Frontend

on:
  push:
    branches: [deploy]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frontend-cordillera

jobs:
  build-and-push:
    name: Build y push imagen frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true
          build-args: |
            VITE_API_GATEWAY_URL=http://localhost:9090
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Resumen
        run: |
          echo "Imagen publicada: ${{ env.IMAGE_NAME }}:latest"
          echo "Para usar en PC-B (LAN): VITE_API_GATEWAY_URL=http://<IP-PC-A>:9090"
