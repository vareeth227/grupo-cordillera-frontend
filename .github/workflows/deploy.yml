name: Deploy — Frontend

on:
  workflow_run:
    workflows: ["CI — Frontend"]
    types: [completed]
    branches: [main]

jobs:
  build-and-deploy:
    name: Build y desplegar en EC2 Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cordillera-frontend:latest
          build-args: |
            VITE_API_GATEWAY_URL=

      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/cordillera-frontend:latest
            docker stop cordillera-frontend 2>/dev/null || true
            docker rm cordillera-frontend 2>/dev/null || true
            docker run -d \
              --name cordillera-frontend \
              --restart unless-stopped \
              -p 80:80 \
              -e BACKEND_HOST=${{ secrets.BACKEND_PRIVATE_IP }} \
              ghcr.io/${{ github.repository_owner }}/cordillera-frontend:latest
            echo "Frontend desplegado:"
            docker ps --filter name=cordillera-frontend
